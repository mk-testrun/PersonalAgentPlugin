name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate Marketplaces (strict) + Evals + Tool-Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate (strict — warnings fail CI, ADR-0007)
        run: npm run validate:strict
      - name: Validate skill evals
        run: npm run evals
      - name: Tool & hook tests
        run: npm run test:tools
      - name: Maturity drift check (docs/skill-maturity.md must be regenerated on change)
        run: |
          npm run maturity
          git diff --exit-code docs/skill-maturity.md || {
            echo "::error::docs/skill-maturity.md ist nicht aktuell — 'npm run maturity' ausführen und committen."; exit 1; }
      - name: Orchestrator-Engine Work↔Home identisch (nur workflows.json darf differieren)
        run: |
          cmp marketplaces/work/plugins/orchestration/skills/workflow-router/scripts/run-state.mjs \
              marketplaces/home/plugins/orchestration/skills/workflow-router/scripts/run-state.mjs
      - name: PowerShell hook scripts syntax check
        run: |
          if command -v pwsh >/dev/null; then
            fail=0
            while IFS= read -r f; do
              pwsh -NoProfile -Command "[void][System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw '$f'), [ref]\$null)" \
                || { echo "::error file=$f::ps1 syntax error"; fail=1; }
            done < <(find marketplaces -name '*.ps1')
            exit $fail
          else
            echo "pwsh not available — skipping ps1 syntax check"
          fi

  mcp:
    name: Build & Test MCP Servers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install (npm ci — lockfile is committed; prepare builds the TS servers)
        run: npm ci
      - name: Test all servers (workspaces)
        run: npm run test:servers
