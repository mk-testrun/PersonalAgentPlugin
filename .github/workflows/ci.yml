name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate Marketplaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate Work Marketplace
        run: node tools/validate-plugins.mjs marketplaces/work
      - name: Validate Home Marketplace
        run: node tools/validate-plugins.mjs marketplaces/home
      - name: Validate Skill Evals (Work)
        run: node tools/run-evals.mjs marketplaces/work
      - name: Validate Skill Evals (Home)
        run: node tools/run-evals.mjs marketplaces/home

  tools:
    name: Tools, Profiles & Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test tools (validator, evals, hooks, bootstrap)
        run: npm run test:tools
      - name: Bootstrap dry-run (beide Profile)
        run: |
          node tools/bootstrap.mjs --profile home
          node tools/bootstrap.mjs --profile work
      - name: JSON-Syntax (profiles, editor, templates)
        run: |
          for f in $(find profiles editor templates .vscode -name '*.json'); do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || { echo "Invalid JSON: $f"; exit 1; }
            echo "ok $f"
          done
      - name: repo-starter .editorconfig ist mit Root synchron
        run: diff .editorconfig templates/repo-starter/.editorconfig

  mcp:
    name: Build & Test MCP Servers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Workspaces
        run: npm install
      - name: Build all workspaces
        run: npm run build --workspaces --if-present
      - name: Test all workspaces
        run: npm test --workspaces
