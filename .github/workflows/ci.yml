name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate Work Marketplace
        run: node tools/validate-plugins.mjs marketplaces/work
      - name: Validate Home Marketplace
        run: node tools/validate-plugins.mjs marketplaces/home
      - name: Validate Skill Evals (Work)
        run: node tools/run-evals.mjs marketplaces/work
      - name: Validate Skill Evals (Home)
        run: node tools/run-evals.mjs marketplaces/home

  mcp:
    name: Build & Test MCP Servers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Workspaces
        run: npm ci || npm install
      - name: Syntax Check anonymizer-proxy
        working-directory: mcp-servers/anonymizer-proxy
        run: |
          node --check src/masker.mjs
          node --check src/server.mjs
      - name: Test anonymizer-proxy roundtrip
        working-directory: mcp-servers/anonymizer-proxy
        run: node test/roundtrip.mjs
      - name: Build password-gen
        working-directory: mcp-servers/password-gen
        run: npm run build
      - name: Test password-gen entropy
        working-directory: mcp-servers/password-gen
        run: node test/entropy.test.mjs
      - name: Build alarm-mcp
        working-directory: mcp-servers/alarm-mcp
        run: npm run build
      - name: Test alarm-mcp scheduler
        working-directory: mcp-servers/alarm-mcp
        run: node test/scheduler.test.mjs
      - name: Build artifact-viewer
        working-directory: mcp-servers/artifact-viewer
        run: npm run build
      - name: Test artifact-viewer fallback
        working-directory: mcp-servers/artifact-viewer
        run: node test/fallback.test.mjs
      - name: Test artifact-viewer textfile
        working-directory: mcp-servers/artifact-viewer
        run: node test/textfile.test.mjs
      # Hinweis: Das .NET-MCP-Template liegt als Kopiervorlage unter
      # marketplaces/work/plugins/meta/skills/mcp-author/templates/dotnet-starter/
      # (kein laufender Server) und wird daher hier nicht gebaut.

  extensions:
    name: Build & Test Copilot-CLI-Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build (warnings as errors)
        run: dotnet build extensions -c Release
      - name: Unit tests
        run: dotnet test extensions -c Release --filter "Category!=Integration"
      - name: Publish heads
        run: |
          for h in Guardian Sentinel Flow Recorder; do
            low=$(echo "$h" | tr '[:upper:]' '[:lower:]')
            dotnet publish "extensions/src/Mkc.Copilot.Extensions.$h" -c Release \
              -o "extensions/host/mkc-work-$low/bin" --nologo
          done
      - name: Validate extensions
        run: node tools/validate-extensions.mjs --strict
      - name: Bridge mock-harness (real binaries)
        run: node --test extensions/shim-test/mock-harness.test.mjs
